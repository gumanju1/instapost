default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: instapost_development
  username: sweta
  password:
  socket: /var/run/mysqld/mysqld.sock

test:
  <<: *default
  database: instapost_test
  username: sweta
  password:
  socket: /var/run/mysqld/mysqld.sock

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>